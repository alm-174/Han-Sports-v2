spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

#default = 1MB
spring.servlet.multipart.max-file-size=50MB

#default = 10 MB (form data)
spring.servlet.multipart.max-request-size=50MB


logging.level.org.springframework.security=${SECURITY_LOG_LEVEL:INFO}

#config jwt
hansport.jwt.base64-secret=${JWT_BASE64_SECRET}


hansport.jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_VALIDITY:86400}
hansport.jwt.refreshtoken-validity-in-seconds=${JWT_REFRESH_TOKEN_VALIDITY:604800}

hansport.upload-file.base-path=${UPLOAD_FILE_BASE_PATH:D:/hansport_v2/hansport_v2fe/upload}

# Cloudinary upload config
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
cloudinary.upload-folder-prefix=${CLOUDINARY_UPLOAD_FOLDER_PREFIX:hansport_v2}

#config oauth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

server.port=${SERVER_PORT:8080}
app.frontend.url=${FRONTEND_URL:https://hansport.shop}
app.cookie.secure=${COOKIE_SECURE:false}
app.seed.enabled=${SEED_ENABLED:true}

##config email with GMAIL
spring.mail.host=smtp.gmail.com
spring.mail.port=587
##thay email cua ban vao day
spring.mail.username=${YOUR_EMAIL}
##thay app password cua ban vao day
spring.mail.password=${YOUR_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
