services:
  mysql:
    image: mysql:8
    container_name: hansport_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: hansport_v2
    ports:
      - "3307:3306"
    volumes:
      - hansport_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./hansport_v2be
      dockerfile: Dockerfile
    container_name: hansport_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/hansport_v2?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: 123456
      JPA_DDL_AUTO: update
      SERVER_PORT: 8080
      FRONTEND_URL: http://localhost:3000
      COOKIE_SECURE: false
      SEED_ENABLED: true
      UPLOAD_FILE_BASE_PATH: /app/upload

      JWT_BASE64_SECRET: ${JWT_BASE64_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - ./uploads:/app/upload

  frontend:
    build:
      context: ./hansport_v2fe
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: hansport_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  hansport_mysql_data: