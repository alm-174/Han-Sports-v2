services:
  postgres:
    image: postgres:16-alpine
    container_name: hansport_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: hansport_v2
    ports:
      - "5432:5432"
    volumes:
      - hansport_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hansport_v2"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./hansport_v2be
      dockerfile: Dockerfile
    container_name: hansport_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hansport_v2
      DB_USERNAME: postgres
      DB_PASSWORD: 123456
      JPA_DDL_AUTO: update
      SERVER_PORT: 8080
      FRONTEND_URL: http://localhost:3000
      COOKIE_SECURE: false
      SEED_ENABLED: true
      UPLOAD_FILE_BASE_PATH: /app/upload

      JWT_BASE64_SECRET: ${JWT_BASE64_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    volumes:
      - ./uploads:/app/upload

  frontend:
    build:
      context: ./hansport_v2fe
      dockerfile: Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: hansport_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  hansport_postgres_data: